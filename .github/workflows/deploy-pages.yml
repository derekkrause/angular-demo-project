name: Deploy Angular to GitHub Pages

on:
  push:
    branches:
      - main

  # Allows manual deployment from the Actions tab.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Angular application
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build Angular application
        shell: bash
        run: |
          if [[ "${{ github.event.repository.name }}" == "${{ github.repository_owner }}.github.io" ]]; then
            BASE_HREF="/"
          else
            BASE_HREF="/${{ github.event.repository.name }}/"
          fi

          npx ng build \
            --configuration production \
            --base-href "$BASE_HREF" \
            --output-path dist/site

      - name: Add SPA fallback
        run: cp dist/site/browser/index.html dist/site/browser/404.html

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist/site/browser

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy application
        id: deployment
        uses: actions/deploy-pages@v4
